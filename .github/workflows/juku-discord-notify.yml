name: Juku Report Discord Notify

on:
  push:
    paths:
      - 'output/juku/**/discord_summary.txt'
      - 'ai-management/output/juku/**/discord_summary.txt'

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Send to Discord
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          FILE=$(git diff-tree --no-commit-id -r --name-only "${{ github.sha }}" | grep 'discord_summary.txt' | head -1)
          if [ -z "$FILE" ]; then
            echo "No discord_summary.txt found, skipping"
            exit 0
          fi
          CONTENT=$(cat "$FILE")
          curl -sS -X POST "$DISCORD_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{\"content\": $(echo "${CONTENT:0:1900}" | jq -Rs .)}"
